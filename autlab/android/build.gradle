// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}


subprojects {
    afterEvaluate { project ->
        project.tasks.matching { task ->
            task.name == 'extractDebugAnnotations' || task.name == 'extractReleaseAnnotations'
        }.configureEach { task ->
            task.enabled = false
        }
    }
}


project(':capacitor-android') {
    afterEvaluate { project ->
        def debugTypedef = project.layout.buildDirectory.file('intermediates/annotations_typedef_file/debug/extractDebugAnnotations/typedefs.txt')
        def releaseTypedef = project.layout.buildDirectory.file('intermediates/annotations_typedef_file/release/extractReleaseAnnotations/typedefs.txt')

        def createDebugTypedef = project.tasks.register('createDebugTypedefPlaceholder') {
            outputs.file(debugTypedef)
            doLast {
                def target = debugTypedef.get().asFile
                target.parentFile.mkdirs()
                target.text = ''
            }
        }

        def createReleaseTypedef = project.tasks.register('createReleaseTypedefPlaceholder') {
            outputs.file(releaseTypedef)
            doLast {
                def target = releaseTypedef.get().asFile
                target.parentFile.mkdirs()
                target.text = ''
            }
        }

        project.tasks.matching { it.name == 'syncDebugLibJars' }.configureEach {
            dependsOn(createDebugTypedef)
        }
        project.tasks.matching { it.name == 'syncReleaseLibJars' }.configureEach {
            dependsOn(createReleaseTypedef)
        }
    }
}


